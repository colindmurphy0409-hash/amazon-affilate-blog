name: Deploy to Vercel

# GitHub↔Vercel webhook is broken — this workflow is the production deploy path.
on:
  workflow_dispatch:
  push:
    branches: [main]

concurrency:
  group: vercel-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: site

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: site/package-lock.json

      - name: Install and build
        run: |
          npm ci
          npm run fetch-images
          echo "Checking product image file sizes..."
          python3 << 'PYEOF'
          import glob, os, sys
          MIN_SIZE = 500
          bad = [f for f in glob.glob('public/images/products/*.jpg') if os.path.getsize(f) <= MIN_SIZE]
          if bad:
              for f in bad:
                  print(f'CORRUPT IMAGE ({os.path.getsize(f)} bytes): {f}')
              sys.exit(1)
          print(f'All {len(glob.glob("public/images/products/*.jpg"))} product images OK (> {MIN_SIZE} bytes)')
          PYEOF
          npm run build
          test -f dist/tymo-curlpro-review/index.html
          test -f dist/index.html
          grep -q "tymo-curlpro-review" dist/index.html

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Link, build on Vercel, deploy prebuilt to production
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          set -euo pipefail
          vercel link --yes --project=amazon-affiliate-blog --scope=murph1 --token="$VERCEL_TOKEN"
          vercel pull --yes --environment=production --token="$VERCEL_TOKEN" --scope=murph1
          vercel build --prod --token="$VERCEL_TOKEN" --scope=murph1
          DEPLOY_URL="$(vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN" --scope=murph1)"
          echo "Deployed to: $DEPLOY_URL"
          curl -fsSL "$DEPLOY_URL/tymo-curlpro-review/" | grep -qi "TYMO"
          curl -fsSL "$DEPLOY_URL/images/products/B0DBZS6MHK.jpg" | wc -c | awk '{ if ($1 < 500) { print "TYMO image too small"; exit 1 } }'
          vercel alias set "$DEPLOY_URL" wellthlab.blog --token="$VERCEL_TOKEN" --scope=murph1
          vercel alias set "$DEPLOY_URL" amazon-affiliate-blog.vercel.app --token="$VERCEL_TOKEN" --scope=murph1
          for attempt in 1 2 3 4 5 6; do
            if curl -fsSL "https://wellthlab.blog/tymo-curlpro-review/" | grep -qi "TYMO"; then
              echo "Production alias verified on attempt $attempt"
              exit 0
            fi
            echo "Waiting for alias propagation (attempt $attempt)..."
            sleep 15
          done
          echo "Alias verification timed out after 90s"
          exit 1
